<div class="qr-screen">
  <header class="qr-header">
    <button mat-icon-button routerLink="/dashboard" class="back-btn">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1>Escaneo de Documentos QR</h1>
  </header>

  <!-- Contenedor Principal Lado a Lado (Flex Layout) -->
  <div class="main-content-layout">

    <!-- COLUMNA IZQUIERDA: TU DISEÑO ORIGINAL DEL ESCÁNER -->
    <div class="scanner-column">
      <!-- Mantenemos tu contenedor intacto -->
      <div class="scanner-container">
        <!-- El escáner de la librería -->
        <zxing-scanner
          *ngIf="scannerEnabled"
          (scanSuccess)="onCodeResult($event)"
          [autofocusEnabled]="true"
          [previewFitMode]="'cover'">
        </zxing-scanner>

        <!-- Marco visual sobre la cámara (Tu diseño original) -->
        <div class="scanner-overlay">
          <div class="target-box">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
          </div>
        </div>
      </div>

      <!-- Hint abajo del scanner, solo si no hay resultado -->
      <div class="hint" *ngIf="!qrResultString">
        <mat-icon>center_focus_weak</mat-icon>
        <p>Coloque el código QR dentro del recuadro</p>
      </div>
    </div>

    <!-- COLUMNA DERECHA: PANEL DE INFORMACIÓN Y BOTONES -->
    <div class="info-column">

      <!-- Se muestra solo cuando hay lectura exitosa -->
      <mat-card class="result-card" *ngIf="qrResultString">
        <mat-card-content>
          <div class="result-header">
            <mat-icon>check_circle</mat-icon>
            <span>Lectura Exitosa</span>
          </div>

          <div class="data-display">
            <p class="data-label">Contenido del QR:</p>
            <p class="qr-data">{{ qrResultString }}</p>
          </div>

          <!-- SECCIÓN DE BOTONES INFERIORES -->
          <div class="action-buttons">
            <button mat-raised-button color="primary" class="action-btn" (click)="abrirTalanquera()">
              <mat-icon>gate</mat-icon> Abrir Talanquera
            </button>

            <button mat-raised-button color="accent" class="action-btn" (click)="irParcialidad()">
              <mat-icon>description</mat-icon> Ir a Parcialidad
            </button>

            <!-- Botón reintentar integrado abajo -->
            <button mat-stroked-button color="warn" class="retry-btn" (click)="limpiarLectura()">
              <mat-icon>refresh</mat-icon> Escanear de nuevo
            </button>
          </div>
        </mat-card-content>
      </mat-card>

      <!-- Panel opcional cuando no hay lectura (puedes quitarlo si prefieres vacio) -->
      <div class="waiting-panel" *ngIf="!qrResultString">
        <mat-icon class="waiting-icon">qr_code_scanner</mat-icon>
        <p>Esperando lectura...</p>
      </div>
    </div>

  </div>
</div>
