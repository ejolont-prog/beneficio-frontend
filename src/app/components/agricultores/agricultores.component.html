<div class="page-container">
  <!-- HEADER ESTILO MODAL -->
  <div class="section-header">
    <div class="title-group">
      <div class="header-with-icon">
        <mat-icon>agriculture</mat-icon>
        <h1>Gestión de Agricultores</h1>
      </div>
    </div>
  </div>

  <!-- SECCIÓN DE FILTROS -->
  <mat-card class="filter-card">
    <div class="filter-container">
      <mat-form-field appearance="outline" class="flex-grow-1" style="min-width: 300px;">
        <mat-label>Buscar por NIT</mat-label>
        <input
          matInput
          (keyup)="aplicarFiltroNit($event)"
          (keypress)="soloNumerosYGuion($event)"
          placeholder="Ej. 1234567-8"
          #inputNit>
        <mat-icon matSuffix style="color: var(--melon-text)">search</mat-icon>
      </mat-form-field>

      <button mat-stroked-button class="back-btn" (click)="limpiarFiltros(inputNit)">
        <mat-icon>filter_alt_off</mat-icon> Limpiar Filtros
      </button>
    </div>
  </mat-card>

  <!-- TABLA DE INFORMACIÓN -->
  <mat-card class="table-card">
    <mat-card-content class="p-0">

      <!-- ESTADO DE CARGA -->
      <div *ngIf="cargando" class="text-center p-5">
        <mat-icon class="loading-icon">sync</mat-icon>
        <p style="color: var(--coffee-dark)">Cargando agricultores...</p>
      </div>

      <div class="table-responsive" *ngIf="!cargando">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

          <!-- NIT -->
          <ng-container matColumnDef="nit">
            <th mat-header-cell *matHeaderCellDef> NIT </th>
            <td mat-cell *matCellDef="let element"> {{element.nit}} </td>
          </ng-container>

          <!-- Nombre -->
          <ng-container matColumnDef="nombre">
            <th mat-header-cell *matHeaderCellDef> Nombre </th>
            <td mat-cell *matCellDef="let element"> {{element.nombre}} </td>
          </ng-container>

          <!-- Observaciones -->
          <ng-container matColumnDef="observaciones">
            <th mat-header-cell *matHeaderCellDef> Observaciones </th>
            <td mat-cell *matCellDef="let element"> {{element.observaciones || 'Sin notas'}} </td>
          </ng-container>

          <!-- Fecha -->
          <ng-container matColumnDef="fechaCreacion">
            <th mat-header-cell *matHeaderCellDef> Fecha Creación </th>
            <td mat-cell *matCellDef="let element"> {{element.fechaCreacion | date:'dd/MM/yyyy'}} </td>
          </ng-container>

          <!-- Acciones -->
          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef> Acciones </th>
            <td mat-cell *matCellDef="let element">
              <button mat-raised-button color="primary" (click)="verDetalle(element)">
                <mat-icon>visibility</mat-icon> Ver Detalle
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

    </mat-card-content>
  </mat-card>
</div>
