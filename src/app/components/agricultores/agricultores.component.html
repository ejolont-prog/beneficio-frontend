<div class="container-fluid p-4">
  <mat-card class="shadow-sm">

    <mat-card-header class="d-flex justify-content-between align-items-center p-3">
      <mat-card-title class="text-primary m-0">Gestión de Agricultores</mat-card-title>
      <button mat-raised-button color="primary">
        <mat-icon>person_add</mat-icon> Nuevo Agricultor
      </button>
    </mat-card-header>

    <mat-card-content>
      <!-- Indicador de carga opcional -->
      <div *ngIf="cargando" class="text-center p-4">
        <span>Cargando datos...</span>
      </div>

      <table mat-table [dataSource]="agricultores" class="w-100" *ngIf="!cargando">

        <!-- ID Column -->
        <ng-container matColumnDef="idUsuario">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let element"> #{{element.idUsuario}} </td>
        </ng-container>

        <!-- Nombre Column -->
        <ng-container matColumnDef="nombreCompleto">
          <th mat-header-cell *matHeaderCellDef> Nombre Completo </th>
          <td mat-cell *matCellDef="let element"> {{element.nombreCompleto}} </td>
        </ng-container>

        <!-- DPI Column -->
        <ng-container matColumnDef="dpi">
          <th mat-header-cell *matHeaderCellDef> DPI </th>
          <td mat-cell *matCellDef="let element"> {{element.dpi}} </td>
        </ng-container>

        <!-- Ubicación Column -->
        <ng-container matColumnDef="ubicacion">
          <th mat-header-cell *matHeaderCellDef> Ubicación </th>
          <td mat-cell *matCellDef="let element"> {{element.ubicacion}} </td>
        </ng-container>

        <!-- Estado Column -->
        <ng-container matColumnDef="estado">
          <th mat-header-cell *matHeaderCellDef> Estado </th>
          <td mat-cell *matCellDef="let element">
            <span class="badge" [ngClass]="element.estado ? 'bg-success' : 'bg-secondary'">
              {{element.estado ? 'Activo' : 'Inactivo'}}
            </span>
          </td>
        </ng-container>

        <!-- Acciones Column -->
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Acciones </th>
          <td mat-cell *matCellDef="let element" class="text-center">
            <button mat-icon-button color="primary" (click)="editarAgricultor(element)" title="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="eliminarAgricultor(element.idUsuario)" title="Eliminar">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
    </mat-card-content>
  </mat-card>
</div>
