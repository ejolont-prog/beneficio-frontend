<div class="container-fluid p-4">
  <mat-card class="shadow-sm">

    <mat-card-header class="d-flex justify-content-between align-items-center p-3">
      <mat-card-title class="text-primary m-0">Gestión de Cuentas</mat-card-title>
      <button mat-raised-button color="primary">
        <mat-icon>add_circle</mat-icon> Nueva Cuenta
      </button>
    </mat-card-header>

    <mat-card-content>
      <table mat-table [dataSource]="cuentas" class="w-100">

        <ng-container matColumnDef="idUsuario">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let element"> #{{element.idUsuario}} </td>
        </ng-container>

        <ng-container matColumnDef="nombreCuenta">
          <th mat-header-cell *matHeaderCellDef> Nombre de la Cuenta </th>
          <td mat-cell *matCellDef="let element"> {{element.nombreCuenta}} </td>
        </ng-container>

        <ng-container matColumnDef="tipo">
          <th mat-header-cell *matHeaderCellDef> Tipo </th>
          <td mat-cell *matCellDef="let element"> {{element.tipo}} </td>
        </ng-container>

        <ng-container matColumnDef="estado">
          <th mat-header-cell *matHeaderCellDef> Estado </th>
          <td mat-cell *matCellDef="let element">
            <span class="badge" [ngClass]="element.estado ? 'bg-success' : 'bg-secondary'">
              {{element.estado ? 'Activa' : 'Inactiva'}}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Acciones </th>
          <td mat-cell *matCellDef="let element" class="text-center">
            <button mat-icon-button color="primary" (click)="editarCuenta(element)" title="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="eliminarCuenta(element.idUsuario)" title="Eliminar">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <!-- ✅ Estas dos líneas son críticas -->
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
    </mat-card-content>
  </mat-card>
</div>
