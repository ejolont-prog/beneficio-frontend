<div class="container-fluid p-4">
  <mat-card class="shadow-sm">

    <mat-card-header class="d-flex justify-content-between align-items-center p-3">
      <mat-card-title class="text-primary m-0">Gestión de Transportistas</mat-card-title>
      <button mat-raised-button color="primary">
        <mat-icon>local_shipping</mat-icon> Nuevo Transportista
      </button>
    </mat-card-header>

    <mat-card-content>
      <!-- Spinner o mensaje de carga -->
      <div *ngIf="cargando" class="text-center p-5">
        <p class="text-muted">Obteniendo listado de transportistas...</p>
      </div>

      <table mat-table [dataSource]="transportistas" class="w-100" *ngIf="!cargando">

        <!-- ID Column -->
        <ng-container matColumnDef="idUsuario">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let element"> #{{element.idUsuario}} </td>
        </ng-container>

        <!-- Nombre Column -->
        <ng-container matColumnDef="nombreCompleto">
          <th mat-header-cell *matHeaderCellDef> Nombre del Piloto </th>
          <td mat-cell *matCellDef="let element"> {{element.nombreCompleto}} </td>
        </ng-container>

        <!-- Licencia Column -->
        <ng-container matColumnDef="licencia">
          <th mat-header-cell *matHeaderCellDef> No. Licencia </th>
          <td mat-cell *matCellDef="let element">
            <code>{{element.licencia}}</code>
          </td>
        </ng-container>

        <!-- Teléfono Column -->
        <ng-container matColumnDef="telefono">
          <th mat-header-cell *matHeaderCellDef> Teléfono </th>
          <td mat-cell *matCellDef="let element"> {{element.telefono}} </td>
        </ng-container>

        <!-- Estado Column -->
        <ng-container matColumnDef="estado">
          <th mat-header-cell *matHeaderCellDef> Estado </th>
          <td mat-cell *matCellDef="let element">
            <span class="badge" [ngClass]="element.estado ? 'bg-success' : 'bg-secondary'">
              {{element.estado ? 'Disponible' : 'No Disponible'}}
            </span>
          </td>
        </ng-container>

        <!-- Acciones Column -->
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Acciones </th>
          <td mat-cell *matCellDef="let element" class="text-center">
            <button mat-icon-button color="primary" (click)="editarTransportista(element)" title="Editar">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="eliminarTransportista(element.idUsuario)" title="Eliminar">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
    </mat-card-content>
  </mat-card>
</div>
