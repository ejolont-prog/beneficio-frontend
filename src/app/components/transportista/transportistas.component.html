<div class="modal-container">
  <div class="dialog-header">
    <mat-icon>person</mat-icon>
    <span>Gestión de Transportistas</span>
  </div>

  <div class="filters-container">
    <mat-form-field>
      <mat-label>Buscar por CUI</mat-label>
      <input matInput (keyup)="aplicarFiltro($event)" (input)="validarSoloNumeros($event)" (keypress)="soloNumeros($event)" placeholder="Ej. 1234..." #inputCui>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Filtrar por Estado</mat-label>
      <mat-select (selectionChange)="filtrarPorEstado($event.value)" [(value)]="estadoSeleccionado">
        <mat-option *ngFor="let est of listaEstados" [value]="est.nombre">
          {{est.nombre}}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <button mat-button (click)="limpiarFiltros()">Limpiar Filtros</button>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <ng-container matColumnDef="agricultor">
      <th mat-header-cell *matHeaderCellDef> Agricultor </th>
      <td mat-cell *matCellDef="let element">
        {{element.agricultor}}
      </td>
    </ng-container>

    <ng-container matColumnDef="cui">
      <th mat-header-cell *matHeaderCellDef> CUI </th>
      <td mat-cell *matCellDef="let element">
        {{element.cui}}
      </td>
    </ng-container>

    <ng-container matColumnDef="nombrecompleto">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let element">
        {{element.nombrecompleto}}
      </td>
    </ng-container>

    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef> Estado </th>
      <td mat-cell *matCellDef="let element">
        {{element.estado}}
      </td>
    </ng-container>

    <ng-container matColumnDef="observaciones">
      <th mat-header-cell *matHeaderCellDef> Observaciones </th>
      <td mat-cell *matCellDef="let element">
        {{element.observaciones || '---'}}
      </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>

      <td mat-cell *matCellDef="let element">

        <button
          mat-raised-button
          color="primary"
          (click)="abrirDialogoEstado(element)">

          Cambiar Estado

        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columnas"></tr>
    <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
  </table>
</div>
