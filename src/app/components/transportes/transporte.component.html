<div class="page-container">
  <div class="section-header">
    <div class="title-group">
      <div class="header-with-icon">
        <mat-icon>local_shipping</mat-icon>
        <h1>Gestión de Transporte</h1>
      </div>
    </div>
  </div>

  <mat-card class="filter-card">
    <div class="filter-container">
      <mat-form-field appearance="outline" class="flex-grow-1" style="min-width: 300px;">
        <mat-label>Buscar por Placa</mat-label>
        <input matInput (keyup)="aplicarFiltroPlaca($event)" #inputPlaca placeholder="Ej. 000AAA"
               pattern="[A-Za-z0-9]*"
               (input)="validarInputPlaca($event)"
               (keyup)="aplicarFiltroPlaca($event)">
        <mat-icon matSuffix style="color: var(--melon-text)">search</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="flex-grow-1" style="min-width: 300px;">
        <mat-label>Filtrar por Estado</mat-label>
        <mat-select [(value)]="filtroEstado" (selectionChange)="aplicarFiltroEstado($event.value)">
          <mat-option value="">Todos los estados</mat-option>
          <mat-option *ngFor="let estado of listaEstados" [value]="estado.nombre">
            {{estado.nombre}}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <button mat-stroked-button class="back-btn" (click)="limpiarFiltros(inputPlaca)">
        <mat-icon>filter_alt_off</mat-icon> Limpiar Filtros
      </button>
    </div>
  </mat-card>

  <mat-card class="table-card">
    <mat-card-content class="p-0">

      <div *ngIf="cargando" class="text-center p-5">
        <mat-icon class="loading-icon">sync</mat-icon>
        <p style="color: var(--coffee-dark)">
          Sincronizando información...
        </p>
      </div>

      <div class="table-responsive" *ngIf="!cargando">

        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

          <ng-container matColumnDef="agricultor">
            <th mat-header-cell *matHeaderCellDef> Agricultor </th>
            <td mat-cell *matCellDef="let element">
              {{element.agricultor}}
            </td>
          </ng-container>

          <ng-container matColumnDef="placa">
            <th mat-header-cell *matHeaderCellDef> Placa </th>
            <td mat-cell *matCellDef="let element">
              {{element.placa}}
            </td>
          </ng-container>

          <ng-container matColumnDef="estado">
            <th mat-header-cell *matHeaderCellDef> Estado </th>
            <td mat-cell *matCellDef="let element">
              {{element.estado}}
            </td>
          </ng-container>

          <ng-container matColumnDef="observaciones">
            <th mat-header-cell *matHeaderCellDef> Observaciones </th>
            <td mat-cell *matCellDef="let element">
              {{element.observaciones || '---'}}
            </td>
          </ng-container>

          <ng-container matColumnDef="acciones">
            <th mat-header-cell *matHeaderCellDef> Acciones </th>
            <td mat-cell *matCellDef="let element">
              <button mat-raised-button color="primary"
                      (click)="cambiarEstado(element)">
                Cambiar Estado
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        </table>
      </div>

    </mat-card-content>
  </mat-card>
</div>
