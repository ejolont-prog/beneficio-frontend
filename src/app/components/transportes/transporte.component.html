<div class="container-fluid p-4">
  <mat-card class="shadow-sm">

    <mat-card-header class="d-flex justify-content-between align-items-center p-3">
      <div class="header-title">
        <mat-card-title class="text-primary m-0">Gestión de Transporte</mat-card-title>
        <mat-card-subtitle>Control de flota y unidades de carga</mat-card-subtitle>
      </div>
      <button mat-raised-button color="primary">
        <mat-icon>add_road</mat-icon> Registrar Vehículo
      </button>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="cargando" class="text-center p-5">
        <mat-icon class="loading-icon">sync</mat-icon>
        <p>Sincronizando flota...</p>
      </div>

      <table mat-table [dataSource]="transportes" class="w-100" *ngIf="!cargando">

        <!-- ID Column -->
        <ng-container matColumnDef="idTransporte">
          <th mat-header-cell *matHeaderCellDef> No. </th>
          <td mat-cell *matCellDef="let element"> {{element.idTransporte}} </td>
        </ng-container>

        <!-- Placa Column -->
        <ng-container matColumnDef="placa">
          <th mat-header-cell *matHeaderCellDef> Placa </th>
          <td mat-cell *matCellDef="let element">
            <span class="placa-label">{{element.placa}}</span>
          </td>
        </ng-container>

        <!-- Tipo Column -->
        <ng-container matColumnDef="tipoVehiculo">
          <th mat-header-cell *matHeaderCellDef> Vehículo / Marca </th>
          <td mat-cell *matCellDef="let element">
            <strong>{{element.tipoVehiculo}}</strong><br>
            <small class="text-muted">{{element.marca}}</small>
          </td>
        </ng-container>

        <!-- Capacidad Column -->
        <ng-container matColumnDef="capacidad">
          <th mat-header-cell *matHeaderCellDef> Capacidad Máx. </th>
          <td mat-cell *matCellDef="let element"> {{element.capacidadMaxima}} </td>
        </ng-container>

        <!-- Estado Column -->
        <ng-container matColumnDef="estado">
          <th mat-header-cell *matHeaderCellDef> Estado </th>
          <td mat-cell *matCellDef="let element">
            <span class="badge" [ngClass]="getBadgeClass(element.estado)">
              {{element.estado}}
            </span>
          </td>
        </ng-container>

        <!-- Acciones Column -->
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Acciones </th>
          <td mat-cell *matCellDef="let element" class="text-center">
            <button mat-icon-button color="primary" (click)="editarTransporte(element)" matTooltip="Editar vehículo">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="eliminarTransporte(element.idTransporte)" matTooltip="Eliminar de flota">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>
    </mat-card-content>
  </mat-card>
</div>
